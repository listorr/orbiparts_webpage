<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEROSHELL - Revisión de Imágenes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        
        .card-image {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #f7fafc;
            padding: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .card-content {
            padding: 15px;
        }
        
        .part-number {
            font-size: 0.85em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-info {
            font-size: 0.8em;
            color: #718096;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        
        .size {
            color: #48bb78;
            font-weight: 600;
        }
        
        .no-image-card {
            background: #fed7d7;
            border-color: #fc8181;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }
        
        .no-image-content {
            color: #c53030;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .filter-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛢️ AEROSHELL - Revisión de Imágenes</h1>
        <p class="subtitle">Productos scrapeados de Skymart</p>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-number">50</span>
                <span class="stat-label">Total Productos</span>
            </div>
            <div class="stat">
                <span class="stat-number">49</span>
                <span class="stat-label">Con Imagen</span>
            </div>
            <div class="stat">
                <span class="stat-number">1</span>
                <span class="stat-label">Sin Imagen</span>
            </div>
        </div>
        
        <div class="filter-bar">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar por número de parte o nombre...">
            <button class="filter-btn active" onclick="filterAll()">Todas</button>
            <button class="filter-btn" onclick="filterType('GREASE')">Grasas</button>
            <button class="filter-btn" onclick="filterType('OIL')">Aceites</button>
            <button class="filter-btn" onclick="filterType('FLUID')">Fluidos</button>
        </div>
        
        <div class="grid" id="imageGrid">
            <!-- Producto 1 -->
            <div class="card" data-part="29616" data-name="100-55GL" data-type="OIL">
                <img class="card-image" src="29616_100-55GL.png" alt="100-55GL">
                <div class="card-content">
                    <div class="part-number">Part #29616</div>
                    <div class="product-name">100-55GL</div>
                    <div class="file-info">
                        <span>PNG</span>
                        <span class="size">164 KB</span>
                    </div>
                </div>
            </div>
            
            <!-- Producto 2 -->
            <div class="card" data-part="39603" data-name="100-QT" data-type="OIL">
                <img class="card-image" src="39603_100-QT.jpg" alt="100-QT">
                <div class="card-content">
                    <div class="part-number">Part #39603</div>
                    <div class="product-name">100-QT</div>
                    <div class="file-info">
                        <span>JPG</span>
                        <span class="size">408.76 KB</span>
                    </div>
                </div>
            </div>
            
            <!-- Producto destacado: 5-CTG -->
            <div class="card" data-part="73937" data-name="5-CTG" data-type="GREASE" style="border-color: #48bb78; border-width: 3px;">
                <img class="card-image" src="73937_5-CTG.png" alt="5-CTG">
                <div class="card-content">
                    <div class="part-number">Part #73937 ⭐</div>
                    <div class="product-name">5-CTG (Tu producto)</div>
                    <div class="file-info">
                        <span>PNG</span>
                        <span class="size">108.66 KB</span>
                    </div>
                </div>
            </div>
            
            <!-- Producto sin imagen -->
            <div class="card no-image-card" data-part="190941" data-name="ASF31-GL" data-type="FLUID">
                <div class="no-image-content">
                    <div class="part-number">Part #190941</div>
                    <div class="product-name">ASF31-GL</div>
                    <p style="margin-top: 10px;">❌ Sin imagen disponible en Skymart</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Búsqueda en tiempo real
        document.getElementById('searchBox').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const partNumber = card.dataset.part?.toLowerCase() || '';
                const productName = card.dataset.name?.toLowerCase() || '';
                
                if (partNumber.includes(searchTerm) || productName.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
        
        function filterAll() {
            document.querySelectorAll('.card').forEach(card => card.style.display = 'block');
            setActiveBtn(0);
        }
        
        function filterType(type) {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const cardType = card.dataset.type || '';
                card.style.display = cardType.includes(type) ? 'block' : 'none';
            });
        }
        
        function setActiveBtn(index) {
            document.querySelectorAll('.filter-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
        }
    </script>
</body>
</html>
